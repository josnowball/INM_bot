<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #006847 0%, #009b3a 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p { font-size: 12px; opacity: 0.9; margin-top: 4px; }
    .content { padding: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .form-group input:focus { border-color: #006847; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary {
      background: #006847;
      color: white;
    }
    .btn-primary:hover { background: #005538; }
    .btn-secondary {
      background: #eee;
      color: #333;
    }
    .btn-tip {
      background: #ffd700;
      color: #333;
      margin-top: 12px;
    }
    .btn-tip:hover { background: #ffcc00; }
    .profile-card {
      background: white;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .profile-card h3 { font-size: 14px; margin-bottom: 8px; }
    .profile-card .field {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .profile-card .field strong { color: #333; }
    .status { text-align: center; padding: 8px; font-size: 12px; }
    .status.success { color: #006847; }
    .status.error { color: #ce1126; }
    .hidden { display: none; }
    .footer {
      text-align: center;
      padding: 8px 16px 16px;
      font-size: 11px;
      color: #999;
    }
    .pct-bar {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin-top: 8px;
    }
    .pct-bar-fill {
      height: 100%;
      background: #006847;
      border-radius: 2px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🇲🇽 CitaFacil</h1>
    <p>Auto-fill INM & SRE appointments</p>
  </div>

  <!-- Login view -->
  <div id="login-view" class="content">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your CitaFacil password">
    </div>
    <button class="btn btn-primary" id="login-btn">Log In</button>
    <div id="login-status" class="status hidden"></div>
    <div class="footer">
      Free forever. No account? Sign up via Telegram @CitaFacilBot
    </div>
  </div>

  <!-- Profile view (logged in) -->
  <div id="profile-view" class="content hidden">
    <div class="profile-card">
      <h3 id="profile-name">—</h3>
      <div class="field"><strong>Nationality:</strong> <span id="profile-nationality">—</span></div>
      <div class="field"><strong>Passport:</strong> <span id="profile-passport">—</span></div>
      <div class="field"><strong>Phone:</strong> <span id="profile-phone">—</span></div>
      <div class="pct-bar"><div class="pct-bar-fill" id="profile-pct" style="width: 0%"></div></div>
      <div class="field" style="margin-top: 4px; text-align: right;"><span id="profile-pct-text">0%</span> complete</div>
    </div>
    <p style="font-size: 12px; color: #666; margin-bottom: 12px;">
      Navigate to <strong>citas.sre.gob.mx</strong> or <strong>citas.inm.gob.mx</strong> and click "Auto-Fill" on the floating panel.
    </p>
    <button class="btn btn-secondary" id="sync-btn">Sync Profile</button>
    <button class="btn btn-secondary" id="logout-btn">Log Out</button>
    <button class="btn btn-tip" id="tip-btn">☕ Tip the Author</button>
    <div class="footer">
      CitaFacil is 100% free, forever.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
